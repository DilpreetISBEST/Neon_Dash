<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON TO OVERWORLD: FIXED SPAWN</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; background: #050505; margin: auto; border: 2px solid #333; }
        .hud { position: absolute; top: 10px; left: 10px; color: #fff; pointer-events: none; text-shadow: 2px 2px #000; z-index: 5; }
        #ui { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { width: 75px; height: 75px; border-radius: 50%; background: rgba(0,255,255,0.1); border: 2px solid #0ff; color: #fff; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; cursor: pointer; user-select: none; }
        .msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 28px; text-align: center; display: none; z-index: 10; width: 80%; line-height: 1.5; text-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body>

<div class="hud">
    <div id="stats">LVL: 0 | SCORE: 0</div>
    <div id="world-txt" style="color: #f0f;">WORLD: NEON VOID</div>
    <div id="fly-bar" style="width: 120px; height: 10px; background: #222; margin-top: 8px; border: 1px solid #fff;">
        <div id="fly-fill" style="width: 100%; height: 100%; background: #0ff;"></div>
    </div>
</div>

<div id="ui">
    <div class="btn" onmousedown="superJump()" ontouchstart="superJump()">SUPER (E)</div>
    <div class="btn" onmousedown="startFly()" ontouchstart="startFly()" onmouseup="stopFly()" ontouchend="stopFly()">FLY (F)</div>
</div>

<div id="end-screen" class="msg"></div>

<canvas id="g"></canvas>

<script>
const canvas = document.getElementById('g');
const c = canvas.getContext('2d');
canvas.width = 800; canvas.height = 400;

const audio = new (window.AudioContext || window.webkitAudioContext)();
function beep(f, d, t="square") {
    let o = audio.createOscillator(); let g = audio.createGain();
    o.type = t; o.frequency.value = f;
    g.gain.setValueAtTime(0.05, audio.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime+d);
    o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime+d);
}

let world = "neon"; 
let score = 0, lvl = 0, running = true, specialObj = null, obstacles = [];

const p = {
    x: 100, y: 348, w: 32, h: 32, dy: 0, jumps: 0, 
    isFlying: false, flyEnergy: 100, color: "#0ff",
    update() {
        if (this.isFlying && this.flyEnergy > 1) { this.dy = -5; this.flyEnergy -= 0.8; } 
        else { this.dy += 0.85; if (this.flyEnergy < 100) this.flyEnergy += 0.3; }
        document.getElementById('fly-fill').style.width = this.flyEnergy + "%";
        this.y += this.dy;
        if (this.y > 348) { this.y = 348; this.dy = 0; this.jumps = 0; }
    },
    draw() {
        c.fillStyle = this.color;
        if (world === "neon") { c.shadowBlur = 15; c.shadowColor = this.color; } else { c.shadowBlur = 0; }
        c.fillRect(this.x, this.y, this.w, this.h);
        if (world !== "neon") { // Add block eyes
            c.fillStyle = "#000"; c.fillRect(this.x+22, this.y+8, 4, 4);
        }
    }
};

function jump() { if (p.jumps < 2) { p.dy = -13; p.jumps++; beep(400, 0.1, "sine"); } }
function superJump() { if (p.y >= 340) { p.dy = -22; beep(200, 0.2); } }
function startFly() { p.isFlying = true; }
function stopFly() { p.isFlying = false; }

function spawn() {
    if (!running) return;
    // Don't spawn normal obstacles if we are waiting for a transition block
    if (!specialObj) {
        let type = world === "neon" ? "neon" : (world === "overworld" ? "stone" : "water");
        obstacles.push({ x: 850, y: 330 + Math.random()*20, w: 30, h: 50, type: type });
    }
    setTimeout(spawn, Math.max(400, 1600 - (lvl * 120)));
}

function loop() {
    if (!running) return;
    c.clearRect(0,0,800,400);

    // Dynamic Floor
    c.strokeStyle = world === "neon" ? "#f0f" : (world === "volcano" ? "#f40" : "#4a3");
    c.lineWidth = 4; c.beginPath(); c.moveTo(0, 385); c.lineTo(800, 385); c.stroke();

    p.update(); p.draw();

    if (specialObj) {
        specialObj.x -= 4;
        c.fillStyle = specialObj.color;
        c.fillRect(specialObj.x, specialObj.y, 45, 45);
        if (p.x < specialObj.x + 45 && p.x + p.w > specialObj.x && p.y < specialObj.y + 45 && p.y + p.h > specialObj.y) {
            if (world === "neon") {
                world = "overworld"; lvl = 0; score = 0; p.color = "#5d3"; specialObj = null; obstacles = [];
                document.getElementById('world-txt').innerText = "WORLD: OVERWORLD";
                document.getElementById('world-txt').style.color = "#0f0";
                beep(600, 0.5);
            } else if (world === "volcano") {
                running = false;
                document.getElementById('end-screen').innerText = "YOU ARE TOO GOOD TO LOSE\nI CANT CODE ANYMORE... YOU WIN!";
                document.getElementById('end-screen').style.display = "block";
            }
        }
    }

    obstacles.forEach((o, i) => {
        o.x -= (6 + lvl);
        c.fillStyle = o.type === "neon" ? "#f0f" : (o.type === "stone" ? "#777" : "#00f");
        c.fillRect(o.x, o.y, o.w, o.h);

        if (p.x < o.x + o.w && p.x + p.w > o.x && p.y < o.y + o.h && p.y + p.h > o.y) {
            score = 0; lvl = 0; obstacles = []; beep(100, 0.2); 
        }

        if (o.x < -50) {
            obstacles.splice(i, 1);
            score += 10;
            if (score > 0 && score % 50 === 0) {
                lvl++; beep(800, 0.05);
                if (lvl >= 10) {
                    if (world === "neon") specialObj = {x: 900, y: 340, color: "#4a3"};
                    else if (world === "overworld") {
                        world = "volcano"; lvl = 0; score = 0; obstacles = [];
                        document.getElementById('world-txt').innerText = "WORLD: VOLCANO";
                        document.getElementById('world-txt').style.color = "#f40";
                        specialObj = {x: 1200, y: 340, color: "#f40"};
                    }
                }
            }
        }
    });

    document.getElementById('stats').innerText = `LVL: ${lvl} | SCORE: ${score}`;
    requestAnimationFrame(loop);
}

window.onkeydown = (e) => { 
    if (e.code === "Space") jump(); 
    if (e.code === "KeyE") superJump(); 
    if (e.code === "KeyF") startFly(); 
};
window.onkeyup = (e) => { if (e.code === "KeyF") stopFly(); };
canvas.onmousedown = jump;
spawn(); loop();
</script>
</body>
</html>
